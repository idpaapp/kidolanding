version: '3.8'

services:
  app:
    build: .
    container_name: ideh-landing
    ports:
      - "5004:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - default
      - nginx-proxy_nginx-network

networks:
  nginx-proxy_nginx-network:
    external: true

